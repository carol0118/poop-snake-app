<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#7a4b2f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="便便贪吃蛇" />
    <title>便便贪吃蛇</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="backdrop backdrop-a"></div>
    <div class="backdrop backdrop-b"></div>

    <main class="app-shell">
      <section class="hero-card">
        <div class="hero-copy">
          <p class="eyebrow">Touch Game App</p>
          <h1>便便贪吃蛇</h1>
          <p class="subtitle">手机触屏操作。吃便便会长大，吃绿色虫子巧克力会变小。撞墙或撞到自己，游戏结束。</p>
        </div>

        <div class="hero-actions">
          <button id="startBtn" class="primary-btn">开始游戏</button>
          <button id="pauseBtn" class="ghost-btn">暂停</button>
          <button id="restartBtn" class="ghost-btn">重开</button>
          <button id="installBtn" class="install-btn" hidden>安装 APP</button>
        </div>

        <div class="rule-strip">
          <div class="rule-card rule-grow">
            <span class="rule-icon"></span>
            <div>
              <strong>便便补给</strong>
              <p>长度 +1，分数 +10</p>
            </div>
          </div>
          <div class="rule-card rule-shrink">
            <span class="rule-icon"></span>
            <div>
              <strong>绿色虫子巧克力</strong>
              <p>长度 -1，速度会更快</p>
            </div>
          </div>
        </div>
      </section>

      <section class="arena-card">
        <div class="hud-bar">
          <div class="hud-pill">
            <span>分数</span>
            <strong id="scoreValue">0</strong>
          </div>
          <div class="hud-pill">
            <span>长度</span>
            <strong id="lengthValue">3</strong>
          </div>
          <div class="hud-pill">
            <span>纪录</span>
            <strong id="bestValue">0</strong>
          </div>
          <div class="hud-pill">
            <span>状态</span>
            <strong id="statusValue">待机</strong>
          </div>
        </div>

        <div id="boardWrap" class="board-wrap">
          <canvas id="gameCanvas" width="420" height="420" aria-label="便便贪吃蛇游戏画布"></canvas>
          <div id="overlayPanel" class="overlay-panel">
            <div class="overlay-badge">触屏版</div>
            <h2 id="overlayTitle">向上滑一下开始</h2>
            <p id="overlayText">在棋盘上滑动，也可以点下面方向盘。</p>
          </div>
        </div>

        <div class="message-bar">
          <span id="messageText">准备好了。用手指在棋盘上滑动开始。</span>
        </div>
      </section>

      <section class="control-deck">
        <div class="touch-card">
          <h3>触屏操作</h3>
          <p>直接在棋盘上滑动切换方向，也能点下面的大按钮。</p>
        </div>
        <div class="touch-card">
          <h3>节奏提示</h3>
          <p>绿色虫子巧克力会让你变短，而且节奏会更快。</p>
        </div>
      </section>

      <section class="controls-card">
        <div class="mobile-pad">
          <button class="pad-btn pad-up" data-dir="up" aria-label="向上">上</button>
          <div class="pad-mid">
            <button class="pad-btn" data-dir="left" aria-label="向左">左</button>
            <button class="pad-btn pad-center" id="tapStartBtn" aria-label="开始或暂停">开</button>
            <button class="pad-btn" data-dir="right" aria-label="向右">右</button>
          </div>
          <button class="pad-btn pad-down" data-dir="down" aria-label="向下">下</button>
        </div>
      </section>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
