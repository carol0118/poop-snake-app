<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#7a4b2f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="便便贪吃蛇" />
    <title>便便贪吃蛇</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="backdrop backdrop-a"></div>
    <div class="backdrop backdrop-b"></div>

    <main class="app-shell">
      <section class="hero-card">
        <div class="hero-row">
          <div class="hero-title">
            <p class="eyebrow">Ling Ling Rush</p>
            <h1>便便贪吃蛇</h1>
          </div>
          <div class="hero-tools">
            <button id="soundBtn" class="sound-btn" type="button" aria-label="开启声音">音效开</button>
            <button id="installBtn" class="install-btn" hidden>安装</button>
          </div>
        </div>

        <div class="hero-actions">
          <button id="startBtn" class="primary-btn">开始</button>
          <button id="pauseBtn" class="ghost-btn">暂停</button>
          <button id="restartBtn" class="ghost-btn">重开</button>
        </div>
      </section>

      <section class="arena-card">
        <div id="boardWrap" class="board-wrap">
          <canvas id="gameCanvas" width="420" height="420" aria-label="便便贪吃蛇游戏画布"></canvas>
          <div class="hud-bar hud-overlay">
            <div class="hud-pill">
              <span>分数</span>
              <strong id="scoreValue">0</strong>
            </div>
            <div class="hud-pill">
              <span>长度</span>
              <strong id="lengthValue">3</strong>
            </div>
            <div class="hud-pill">
              <span>纪录</span>
              <strong id="bestValue">0</strong>
            </div>
            <div class="hud-pill">
              <span>状态</span>
              <strong id="statusValue">待机</strong>
            </div>
          </div>
          <div id="overlayPanel" class="overlay-panel">
            <div class="overlay-badge">触屏版</div>
            <div class="swipe-guide" aria-hidden="true">
              <div class="swipe-finger"></div>
              <div class="swipe-trail"></div>
            </div>
            <h2 id="overlayTitle">往上滑，灵灵快吃</h2>
            <p id="overlayText">在棋盘上滑动控制方向，也能点底部方向键。</p>
          </div>
          <div id="toastMessage" class="toast-message">准备好了。手指滑一下，灵灵就开吃。</div>
        </div>
      </section>

      <section class="controls-card">
        <div class="mobile-pad">
          <button class="pad-btn pad-up" data-dir="up" aria-label="向上">上</button>
          <div class="pad-mid">
            <button class="pad-btn" data-dir="left" aria-label="向左">左</button>
            <button class="pad-btn pad-center" id="tapStartBtn" aria-label="开始或暂停">开</button>
            <button class="pad-btn" data-dir="right" aria-label="向右">右</button>
          </div>
          <button class="pad-btn pad-down" data-dir="down" aria-label="向下">下</button>
        </div>
      </section>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
